name: Forensic Intelligence CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  forensic-audit:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Verify Forensic Architecture (ESLint)
      run: npm run lint
      
    - name: Execute Trust Engine Tests
      run: npm run test
      
    - name: Build Operations Console
      run: npm run build
      env:
        VITE_API_URL: http://localhost:5000
