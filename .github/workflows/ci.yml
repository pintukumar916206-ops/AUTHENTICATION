name: Forensic Intelligence CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  forensic-audit:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Verify Forensic Architecture (ESLint)
      run: npm run lint
      
    - name: Execute Trust Engine Tests
      run: npm run test
      env:
        MONGODB_URI: mongodb://localhost:27017/authentiscan_test
        JWT_SECRET: ci_test_secret_key_123
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      
    - name: Build Operations Console
      run: npm run build
      env:
        VITE_API_URL: http://localhost:3001
