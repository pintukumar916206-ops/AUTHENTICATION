services:
  # Backend API Server
  - type: web
    name: authentiscan-api
    env: node
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

  # Background Worker (Forensic Pipeline)
  - type: worker
    name: authentiscan-worker
    env: node
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromService:
          type: web
          name: authentiscan-api
          envVarKey: MONGODB_URI
      - key: GEMINI_API_KEY
        fromService:
          type: web
          name: authentiscan-api
          envVarKey: GEMINI_API_KEY

  # Frontend Static Site
  - type: web
    name: authentiscan-web
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: authentiscan-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
